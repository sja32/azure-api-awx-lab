---
- name: Deploy NGINX API endpoint
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Ensure nginx is enabled and running
      ansible.builtin.service:
        name: nginx
        enabled: true
        state: started

    - name: Create API response file
      ansible.builtin.copy:
        dest: /var/www/html/api.json
        mode: '0644'
        content: |
          {
            "status": "ok",
            "message": "Hello from Sharod's Azure API lab",
            "service": "nginx",
            "automation": "AWX + Ansible"
          }

    - name: Configure nginx /api endpoint
      ansible.builtin.blockinfile:
        path: /etc/nginx/sites-available/default
        marker: "# {mark} ANSIBLE API ENDPOINT"
        insertbefore: '^\s*}\s*$'
        block: |
          location = /api {
              default_type application/json;
              alias /var/www/html/api.json;
          }
      notify: Reload nginx

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded