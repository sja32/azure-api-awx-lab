---
- name: Deploy NGINX API endpoint
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Create API response file
      ansible.builtin.copy:
        dest: /var/www/html/api.json
        mode: '0644'
        content: |
          {
            "status": "ok",
            "message": "Hello from Sharod's Azure API lab",
            "service": "nginx",
            "automation": "AWX + Ansible"
          }

    - name: Deploy nginx default site config
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/default
        mode: '0644'
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;

              root /var/www/html;
              index index.html index.htm index.nginx-debian.html;
              server_name _;

              location = /api {
                  default_type application/json;
                  alias /var/www/html/api.json;
              }

              location = /api.json {
                  return 403;
              }

              location / {
                  try_files $uri $uri/ =404;
              }
          }
      notify: Validate and reload nginx

    - name: Ensure nginx is enabled and running
      ansible.builtin.service:
        name: nginx
        enabled: true
        state: started

  handlers:
    - name: Validate and reload nginx
      ansible.builtin.shell: nginx -t && systemctl reload nginx
      changed_when: true